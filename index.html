<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>World Cup Participant & Flag Draw</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container">
        <h1>🏆 WORLD CUP DRAW SIMULATOR 🏆</h1>
        
        <div class="pot-container">
            <h3>Input Nama Peserta/Pemain:</h3>
            <div style="display: flex; gap: 10px; justify-content: center; margin-bottom: 15px;">
                <input type="text" id="input-peserta" placeholder="Ketik nama peserta... (Contoh: Andi)" style="padding: 10px; border-radius: 20px; border: 1px solid #334155; background: #0f172a; color: #fff; width: 250px;">
                <button onclick="tambahPeserta()" style="padding: 10px 20px; font-size: 14px;">Tambah</button>
            </div>
            
            <h3>Daftar Peserta yang Akan Dikocok:</h3>
            <div id="pot-teams" class="pot-teams"></div>
        </div>

        <div class="control-panel">
            <button id="draw-btn" onclick="kocokSatuPeserta()">Kocok 1 Peserta & Bendera!</button>
            <button id="reset-btn" onclick="resetDraw()" class="btn-reset">Reset</button>
        </div>

        <div class="grid-groups">
            <div class="group-card" id="group-A"><div class="group-header">GRUP A</div><ul class="team-list"></ul></div>
            <div class="group-card" id="group-B"><div class="group-header">GRUP B</div><ul class="team-list"></ul></div>
            <div class="group-card" id="group-C"><div class="group-header">GRUP C</div><ul class="team-list"></ul></div>
            <div class="group-card" id="group-D"><div class="group-header">GRUP D</div><ul class="team-list"></ul></div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
